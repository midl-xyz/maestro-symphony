name: Build Binaries

on:
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

jobs:
    build-binaries:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      arch: amd64
                      linker: x86_64-linux-gnu-gcc
                      deps: gcc-x86-64-linux-gnu g++-x86-64-linux-gnu libc6-dev-amd64-cross
                    - target: aarch64-unknown-linux-gnu
                      arch: arm64
                      linker: aarch64-linux-gnu-gcc
                      deps: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Rust toolchain
              uses: moonrepo/setup-rust@v1
              with:
                  cache: false
                  channel: 1.87
                  targets: ${{ matrix.target }}

            - name: Install Rust target
              run: rustup target add ${{ matrix.target }}

            - name: Setup Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: build-${{ matrix.target }}

            - name: Install cross-compilation dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install --no-install-recommends --yes \
                    build-essential \
                    libclang-dev \
                    ${{ matrix.deps }}

            - name: Configure linker
              run: |
                  cat << EOF >> ~/.cargo/config.toml
                  [target.${{ matrix.target }}]
                  linker = "${{ matrix.linker }}"
                  EOF

            - name: Build binary
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Package binary
              run: |
                  mkdir -p dist
                  tar -C target/${{ matrix.target }}/release \
                    -czf dist/maestro-symphony-${{ matrix.target }}.tar.gz \
                    maestro-symphony

            - name: Upload binary artifact
              uses: actions/upload-artifact@v4
              with:
                  name: maestro-symphony-${{ matrix.arch }}
                  path: dist/maestro-symphony-${{ matrix.target }}.tar.gz
                  if-no-files-found: error
